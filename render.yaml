# render.yaml
services:
  # Monolith: Next.js + Socket.io + APIs
  - type: web
    name: ctf-monolith
    env: node
    # Note: Adding prisma generate to ensure the client is available for the build
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ctf-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CALLBACK_URL
        value: https://ctf-monolith.onrender.com/auth/google/callback

# Databases
databases:
  - name: ctf-db
    plan: free
