# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'services/challenge-service/package-lock.json'

    - name: Install dependencies (Challenge Service)
      working-directory: services/challenge-service
      run: npm ci

    - name: Generate Prisma Client
      working-directory: services/challenge-service
      run: npx prisma generate
