version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ctf-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ctf_db}
    ports:
      - "5432:5432"
    networks:
      - ctf-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ctf-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ctf-network
    volumes:
      - redis_data:/data

  monolith:
    build: ./services/frontend
    container_name: ctf-monolith
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ctf_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CALLBACK_URL: http://localhost:3000/auth/google/callback
    depends_on:
      - db
      - redis
    networks:
      - ctf-network

networks:
  ctf-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
